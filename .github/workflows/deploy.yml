name: Deploy Okra Server

on:
  push:
    branches: [ "main" ]

jobs:
    deploy:
        runs-on: self-hosted
    
        steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            persist-credentials: false # Prevent keychain dialog on MacOS
    
        - name: Build Release
          run: cargo build --release
    
        - name: Restart Service
          run: |
            # Copy binary to a stable location
            cp target/release/okra-server ~/server/current_bin
            # Tell macOS to restart the background service
            launchctl kickstart -k gui/$(id -u)/com.okra.server